<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Alquiler Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Sistema de Alquiler de Vehículos</h1>
</header>

<main class="container">
    <section class="card">
        <h2>Registrar Vehículo</h2>
        <div class="form-group">
            <input id="marca" placeholder="Marca">
            <input id="modelo" placeholder="Modelo">
            <input id="anio" type="number" placeholder="Año">
            <input id="categoria" placeholder="Categoría">
            <button class="btn-save" onclick="guardar()">Guardar Vehículo</button>
        </div>
        <ul id="lista" class="data-list"></ul>
    </section>

    <section class="card">
        <h2>Registrar Cliente</h2>
        <div class="form-group">
            <input id="nombre" placeholder="Nombre Completo">
            <input id="telefono" placeholder="Teléfono">
            <input id="licencia" placeholder="Núm. Licencia">
            <button class="btn-save" onclick="guardarCliente()">Guardar Cliente</button>
        </div>
        <ul id="listaClientes" class="data-list"></ul>
    </section>

    <section class="card full-width">
        <h2>Crear Nueva Reserva</h2>
        <div class="form-group row">
            <input id="vehiculo_id" type="number" placeholder="ID Vehículo">
            <input id="cliente_id" type="number" placeholder="ID Cliente">
            <div class="date-group">
                <label for="fecha_inicio">Desde:</label>
                <input type="date" id="fecha_inicio">
            </div>
            <div class="date-group">
                <label for="fecha_fin">Hasta:</label>
                <input type="date" id="fecha_fin">
            </div>
            <button class="btn-reserve" onclick="crearReserva()">Confirmar Reserva</button>
        </div>
        <ul id="listaReservas" class="data-list grid-list"></ul>
    </section>
</main>

<script src="app.js"></script>
</body>
</html>
